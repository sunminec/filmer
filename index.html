<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Filmer</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <button id="backBtn" class="icon-btn header-back" aria-label="Back" hidden>
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M15 18l-6-6 6-6" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <h1 id="title" class="header-title"></h1>
      <button id="sortBtn" class="icon-circle" aria-label="Sort" hidden>
        <svg viewBox="0 0 24 24"><path d="M7 4v15M7 4L4.5 6.7M7 4l2.5 2.7M17 20V5M17 20l-2.5-2.7M17 20l2.5-2.7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="editBtn" class="icon-circle" aria-label="Edit sections" hidden>
        <svg viewBox="0 0 24 24"><path d="M4 20.5l4.2-1 9.1-9.1a1.8 1.8 0 0 0 0-2.6l-1.1-1.1a1.8 1.8 0 0 0-2.6 0L4.5 15.8l-1 4.7z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="M13.5 7.2l3.3 3.3" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
      </button>
    </header>

    <!-- Main content -->
    <main id="content" class="content"></main>

    <!-- Floating Add button -->
    <button id="fab" class="fab" aria-label="Add" hidden>
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/></svg>
      <span id="fabLabel">Add</span>
    </button>
  </div>

  <!-- Modal host -->
  <div id="modalRoot"></div>

  <script src="app.js"></script>
</body>
</html>
