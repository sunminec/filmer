<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Filmer</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <button id="backBtn" class="icon-btn header-back" aria-label="Back" hidden>
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M15 18l-6-6 6-6" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <h1 id="title" class="header-title">Filmer</h1>
      <button id="addBtn" class="add-btn" aria-label="Add">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
        <span id="addLabel">Add</span>
      </button>
    </header>

    <!-- Sort bar (only on category screen) -->
    <div id="sortBar" class="sort-bar" hidden>
      <span class="sort-label">Sort</span>
      <div class="sort-options">
        <button class="sort-chip" data-sort="rating">Rating</button>
        <button class="sort-chip" data-sort="date">Date</button>
        <button class="sort-chip" data-sort="alpha">A–Z</button>
      </div>
    </div>

    <!-- Main content -->
    <main id="content" class="content"></main>
  </div>

  <!-- Modal host -->
  <div id="modalRoot"></div>

  <script src="app.js"></script>
</body>
</html>
